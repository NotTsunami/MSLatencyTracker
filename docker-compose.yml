services:
  tracker:
    build: .
    container_name: mslatencytracker-go
    restart: unless-stopped
    # Internal networks only — the API is published through the Cloudflare
    # Tunnel (cloudflared service below), never on the host. To hit it
    # directly during local testing, temporarily add a `ports: ["8080:8080"]`
    # mapping.
    expose:
      - "8080"
    env_file:
      - .env
    environment:
      # Points at the bundled postgres service over the internal network,
      # overriding any DATABASE_URL from .env.
      DATABASE_URL: postgres://${POSTGRES_USER:-mslatency}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-mslatency}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    # "default" provides internet access for the pings and carries the
    # tunnel-to-API traffic; "backend" provides the private path to postgres.
    networks:
      - default
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Outbound-only connection to Cloudflare's edge; ingress (public hostname →
  # http://tracker:8080) is configured in the Zero Trust dashboard, so the
  # container only needs the tunnel token. No router port-forwarding and no
  # exposed home IP.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: mslatencytracker-tunnel
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:?set TUNNEL_TOKEN in .env}
    depends_on:
      tracker:
        condition: service_healthy
    networks:
      - default

  postgres:
    image: postgres:18-alpine
    container_name: mslatencytracker-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mslatency}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-mslatency}
    volumes:
      - pgdata:/var/lib/postgresql
    # No published ports, and only on the internal network: postgres is
    # reachable by the tracker service but never from outside the host.
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mslatency} -d ${POSTGRES_DB:-mslatency}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  # internal: true blocks all traffic in or out of this network except
  # between its own containers.
  backend:
    internal: true

volumes:
  pgdata:
