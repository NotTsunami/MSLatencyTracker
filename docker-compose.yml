services:
  tracker:
    build: .
    container_name: mslatencytracker-go
    restart: unless-stopped
    # NET_RAW lets the container open raw ICMP sockets for ping.
    cap_add:
      - NET_RAW
    ports:
      - "8080:8080"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
